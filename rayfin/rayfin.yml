id: embr-sample-rayfin-nextjs
name: embr-sample-rayfin-nextjs
version: 1.0.0
services:
  # Auth must be enabled on Fabric-managed Rayfin even for data-only use.
  # Sign-in is interactive (browser Fabric flow); allowedRedirectUris must
  # include every origin the app is served from.
  auth:
    enabled: true
    fabric:
      enabled: true
    allowedRedirectUris:
      - http://localhost:3000
      - https://production-embr-sample-rayfin-nextjs-df4b5a64.app.embr.azure
      - https://production-embr-sample-rayfin-nextjs-df4b5a64.app.embr.azure/
  data:
    enabled: true
    dialect: mssql
  # The frontend is a Next.js server app hosted on Embr, NOT Rayfin static
  # hosting. Disable Rayfin's static hosting so `rayfin up` only provisions
  # the backend (database + data API).
  staticHosting:
    enabled: false